<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#EFE2D0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="A Poem Per Day">
  {{ROBOTS_META}}
  <meta name="description" content="{{PAGE_DESCRIPTION}}">
  {{CANONICAL_TAG}}
  <meta property="og:site_name" content="A Poem Per Day">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{PAGE_TITLE}}">
  <meta property="og:description" content="{{PAGE_DESCRIPTION}}">
  {{OG_URL_TAG}}
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{PAGE_TITLE}}">
  <meta name="twitter:description" content="{{PAGE_DESCRIPTION}}">
  <title>{{PAGE_TITLE}}</title>
  <link rel="stylesheet" href="{{ASSET_PATH}}">
  {{FONT_PRELOADS}}
  <link rel="manifest" href="{{MANIFEST_PATH}}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{FAVICON_512_PATH}}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{FAVICON_32_PATH}}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{APPLE_TOUCH_ICON_PATH}}">
</head>
<body>
  <main data-default-as-of="{{DEFAULT_AS_OF}}">
    <h1 id="home-title">{{FALLBACK_TITLE}}</h1>
    <p id="home-meta" class="meta">{{FALLBACK_META}}</p>
    <article id="home-content" class="content-block">{{FALLBACK_POEM_HTML}}</article>
    <noscript>
      <p class="meta">You are viewing the static version.</p>
    </noscript>
  </main>

  {{FOOTER}}
  <script src="{{SCRIPT_PATH}}" defer></script>
</body>
</html>
