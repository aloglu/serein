<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>document.documentElement.classList.add("js");</script>
  <meta name="theme-color" content="#EFE2D0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="A Poem Per Day">
  <meta name="description" content="Archive of published poems.">
  {{CANONICAL_TAG}}
  <meta property="og:site_name" content="A Poem Per Day">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Archive | A Poem Per Day">
  <meta property="og:description" content="Archive of published poems.">
  {{OG_URL_TAG}}
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Archive | A Poem Per Day">
  <meta name="twitter:description" content="Archive of published poems.">
  {{ROBOTS_META}}
  <title>Archive | A Poem Per Day</title>
  <link rel="stylesheet" href="{{ASSET_PATH}}">
  {{FONT_PRELOADS}}
  <link rel="manifest" href="{{MANIFEST_PATH}}">
  <link rel="alternate" type="application/rss+xml" title="A Poem Per Day RSS Feed" href="{{RSS_PATH}}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{FAVICON_512_PATH}}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{FAVICON_32_PATH}}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{APPLE_TOUCH_ICON_PATH}}">
</head>
<body>
  <main data-default-as-of="{{DEFAULT_AS_OF}}" data-dynamic-page="1">
    <h1>Archive</h1>
    <div class="content-block">
      <div id="archive-tree" class="archive-tree">{{FALLBACK_ARCHIVE_ROWS}}</div>
    </div>
  </main>
  {{FOOTER}}
  <script src="{{SCRIPT_PATH}}" defer></script>
</body>
</html>
