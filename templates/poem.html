<!doctype html>
<html lang="en" data-runtime-as-of-enabled="{{RUNTIME_AS_OF_ENABLED}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>document.documentElement.classList.add("js");</script>
  <meta name="theme-color" content="#EFE2D0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="A Poem Per Day">
  <meta name="author" content="{{POET}}">
  <meta name="description" content="{{DESCRIPTION}}">
  {{CANONICAL_TAG}}
  <meta property="og:site_name" content="A Poem Per Day">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}} | A Poem Per Day">
  <meta property="og:description" content="{{DESCRIPTION}}">
  {{OG_URL_TAG}}
  <meta name="twitter:card" content="{{TWITTER_CARD}}">
  <meta name="twitter:title" content="{{TITLE}} | A Poem Per Day">
  <meta name="twitter:description" content="{{DESCRIPTION}}">
  {{SOCIAL_META}}
  {{HEAD_EXTRA}}
  {{ROBOTS_META}}
  <title>{{TITLE}} | A Poem Per Day</title>
  <script>
    (() => {
      const poemDate = "{{DATE}}";
      const defaultAsOf = "{{DEFAULT_AS_OF}}";
      const allowRuntimeAsOf = document.documentElement.dataset.runtimeAsOfEnabled === "1";
      const queryDate = allowRuntimeAsOf ? (new URLSearchParams(window.location.search).get("as_of") || "") : "";
      const sitePublishedDate = /^\d{4}-\d{2}-\d{2}$/.test(queryDate)
        ? queryDate
        : (/^\d{4}-\d{2}-\d{2}$/.test(defaultAsOf) ? defaultAsOf : (() => {
          const parts = new Intl.DateTimeFormat("en-CA", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            timeZone: "Europe/Istanbul"
          }).formatToParts(new Date());
          const values = Object.fromEntries(parts.filter((part) => part.type !== "literal").map((part) => [part.type, part.value]));
          return `${values.year}-${values.month}-${values.day}`;
        })());
      const shareHorizon = (() => {
        const match = sitePublishedDate.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!match) return "";
        const dt = new Date(Date.UTC(Number(match[1]), Number(match[2]) - 1, Number(match[3])));
        dt.setUTCDate(dt.getUTCDate() + 1);
        return dt.toISOString().slice(0, 10);
      })();
      if (poemDate <= shareHorizon) return;
      const blockedTitle = "Not Available Yet | A Poem Per Day";
      const blockedDescription = "This poem is not available yet.";
      document.title = blockedTitle;
      const setMeta = (selector, value) => {
        const el = document.querySelector(selector);
        if (el) el.setAttribute("content", value);
      };
      setMeta('meta[name="author"]', "");
      setMeta('meta[name="description"]', blockedDescription);
      setMeta('meta[property="og:title"]', blockedTitle);
      setMeta('meta[name="twitter:title"]', blockedTitle);
      setMeta('meta[property="og:description"]', blockedDescription);
      setMeta('meta[name="twitter:description"]', blockedDescription);
    })();
  </script>
  <link rel="stylesheet" href="{{ASSET_PATH}}">
  {{FONT_PRELOADS}}
  <link rel="manifest" href="{{MANIFEST_PATH}}">
  <link rel="alternate" type="application/rss+xml" title="A Poem Per Day RSS Feed" href="{{RSS_PATH}}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{FAVICON_512_PATH}}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{FAVICON_32_PATH}}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{APPLE_TOUCH_ICON_PATH}}">
</head>
<body>
  <main data-poem-date="{{DATE}}" data-first-poem-date="{{FIRST_POEM_DATE}}" data-default-as-of="{{DEFAULT_AS_OF}}" data-page-data-url="{{PAGE_DATA_URL}}" data-poem-blocked="{{POEM_BLOCKED}}" data-poem-page="1">
    <p class="meta poem-date">{{DATE_META}}</p>
    <h1>{{TITLE}}</h1>
    <p class="meta poem-meta">{{POET_META}}</p>
    <article id="poem-content" class="content-block">{{POEM_TEXT}}</article>
    <p id="poem-share" class="meta poem-share">{{SHARE_META}}</p>
  </main>
  {{FOOTER}}
  <script src="{{SCRIPT_PATH}}" defer></script>
</body>
</html>
