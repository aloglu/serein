<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#EFE2D0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="A Poem Per Day">
  <meta name="author" content="{{AUTHOR}}">
  <meta name="description" content="{{DESCRIPTION}}">
  {{CANONICAL_TAG}}
  <meta property="og:site_name" content="A Poem Per Day">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}} | A Poem Per Day">
  <meta property="og:description" content="{{DESCRIPTION}}">
  {{OG_URL_TAG}}
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{TITLE}} | A Poem Per Day">
  <meta name="twitter:description" content="{{DESCRIPTION}}">
  {{ROBOTS_META}}
  <title>{{TITLE}} | A Poem Per Day</title>
  <link rel="stylesheet" href="{{ASSET_PATH}}">
  {{FONT_PRELOADS}}
  <link rel="manifest" href="{{MANIFEST_PATH}}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{FAVICON_512_PATH}}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{FAVICON_32_PATH}}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{APPLE_TOUCH_ICON_PATH}}">
</head>
<body>
  <main>
    <h1>{{TITLE}}</h1>
    <p class="meta">{{AUTHOR_META}}</p>
    <article class="content-block">{{POEM_TEXT}}</article>
  </main>
  {{FOOTER}}
</body>
</html>
