<!doctype html>
<html lang="en" data-runtime-as-of-enabled="{{RUNTIME_AS_OF_ENABLED}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>document.documentElement.classList.add("js");</script>
  <script>
    (() => {
      const root = document.documentElement;
      const allowRuntimeAsOf = root.dataset.runtimeAsOfEnabled === "1";
      const defaultAsOf = "{{DEFAULT_AS_OF}}";
      const renderedAsOf = "{{RENDERED_AS_OF}}";
      const queryDate = allowRuntimeAsOf ? (new URLSearchParams(window.location.search).get("as_of") || "") : "";
      const effectiveDate = /^\d{4}-\d{2}-\d{2}$/.test(queryDate)
        ? queryDate
        : (/^\d{4}-\d{2}-\d{2}$/.test(defaultAsOf) ? defaultAsOf : (() => {
          const now = new Date();
          const y = now.getFullYear();
          const m = String(now.getMonth() + 1).padStart(2, "0");
          const d = String(now.getDate()).padStart(2, "0");
          return `${y}-${m}-${d}`;
        })());
      if (renderedAsOf && effectiveDate === renderedAsOf) {
        root.dataset.dynamicFallbackReady = "1";
      }
    })();
  </script>
  <meta name="theme-color" content="#EFE2D0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="A Poem Per Day">
  <meta name="description" content="Poets published to date.">
  {{CANONICAL_TAG}}
  <meta property="og:site_name" content="A Poem Per Day">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Poets | A Poem Per Day">
  <meta property="og:description" content="Poets published to date.">
  {{OG_URL_TAG}}
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Poets | A Poem Per Day">
  <meta name="twitter:description" content="Poets published to date.">
  {{ROBOTS_META}}
  <title>Poets | A Poem Per Day</title>
  <link rel="stylesheet" href="{{ASSET_PATH}}">
  {{FONT_PRELOADS}}
  <link rel="manifest" href="{{MANIFEST_PATH}}">
  <link rel="alternate" type="application/rss+xml" title="A Poem Per Day RSS Feed" href="{{RSS_PATH}}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{FAVICON_512_PATH}}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{FAVICON_32_PATH}}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{APPLE_TOUCH_ICON_PATH}}">
</head>
<body>
  <main data-default-as-of="{{DEFAULT_AS_OF}}" data-rendered-as-of="{{RENDERED_AS_OF}}" data-dynamic-page="1">
    <h1>Poets</h1>
    <div class="content-block">
      <div id="poets-tree" class="archive-tree poets-tree">{{FALLBACK_POET_ROWS}}</div>
    </div>
  </main>
  {{FOOTER}}
  <script src="{{SCRIPT_PATH}}" defer></script>
</body>
</html>
