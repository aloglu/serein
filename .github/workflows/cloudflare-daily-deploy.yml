name: Trigger Cloudflare Daily Deploy

on:
  schedule:
    # 00:00 Istanbul time (UTC+3) -> 21:00 UTC previous day
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        env:
          CF_PAGES_DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -z "$CF_PAGES_DEPLOY_HOOK" ]; then
            echo "Missing secret CF_PAGES_DEPLOY_HOOK"
            exit 1
          fi
          max_attempts=6
          delays=(0 300 600 900 900 900)

          for attempt in $(seq 1 "$max_attempts"); do
            delay="${delays[$((attempt - 1))]}"

            if [ "$delay" -gt 0 ]; then
              echo "Waiting ${delay}s before retry ${attempt}/${max_attempts}..."
              sleep "$delay"
            fi

            echo "Trigger attempt ${attempt}/${max_attempts}"

            if http_code="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" --connect-timeout 10 --max-time 30 -X POST "$CF_PAGES_DEPLOY_HOOK")"; then
              curl_exit=0
            else
              curl_exit=$?
            fi

            if [ "$curl_exit" -eq 0 ] && [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "Deploy hook accepted with HTTP ${http_code}."
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ] && { [ "$http_code" = "000" ] || [ "$http_code" -eq 408 ] || [ "$http_code" -eq 429 ] || [ "$http_code" -ge 500 ]; }; then
              echo "Transient failure from Cloudflare deploy hook (curl exit ${curl_exit}, HTTP ${http_code})."
              continue
            fi

            echo "Deploy hook failed permanently (curl exit ${curl_exit}, HTTP ${http_code})."

            if [ "$curl_exit" -ne 0 ]; then
              exit "$curl_exit"
            fi

            exit 1
          done

          echo "Deploy hook failed after ${max_attempts} attempts."
          exit 1
