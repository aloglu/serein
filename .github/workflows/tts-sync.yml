name: Validate TTS Assets

on:
  push:
    branches: ["**"]
    paths:
      - "assets/tts/**"
      - "scripts/build.mjs"
      - "scripts/poetry-line.mjs"
      - "poems/**"
      - "scripts/tts-*.mjs"
      - "scripts/tts-config.mjs"
      - "scripts/tts-manifest.mjs"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "assets/tts/**"
      - "scripts/build.mjs"
      - "scripts/poetry-line.mjs"
      - "poems/**"
      - "scripts/tts-*.mjs"
      - "scripts/tts-config.mjs"
      - "scripts/tts-manifest.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Validate committed TTS assets
        env:
          OPENAI_TTS_VOICE: ${{ vars.OPENAI_TTS_VOICE }}
          OPENAI_TTS_MODEL: ${{ vars.OPENAI_TTS_MODEL }}
          OPENAI_TTS_RESPONSE_FORMAT: ${{ vars.OPENAI_TTS_RESPONSE_FORMAT }}
          OPENAI_TTS_INSTRUCTIONS: ${{ vars.OPENAI_TTS_INSTRUCTIONS }}
          OPENAI_TTS_SPEED: ${{ vars.OPENAI_TTS_SPEED }}
          TTS_RENDER_PROFILE: ${{ vars.TTS_RENDER_PROFILE }}
        run: node scripts/tts-check.mjs
